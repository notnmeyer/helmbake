[tools]
bats = "latest"
go = "1.26.2"
goreleaser = "latest"

[tasks.test]
run = "go test ./... -cover"

[tasks.build]
run = "go build -o dist/ ."

[tasks."install:local"]
depends = ["build"]
description = "install helmbake as a helm plugin from the local build"
run = '''
  set -e
  helm_plugins="$(helm env HELM_PLUGINS)"
  if [ -z "$helm_plugins" ]; then
    echo "could not determine HELM_PLUGINS dir" >&2
    exit 1
  fi
  plugin_dir="$helm_plugins/helmbake"
  mkdir -p "$plugin_dir/bin"
  cp -f plugin.yaml "$plugin_dir/plugin.yaml"
  cp -f dist/helmbake "$plugin_dir/bin/helmbake"
  chmod +x "$plugin_dir/bin/helmbake"
  echo "installed to $plugin_dir"
  echo "try: helm bake --help"
'''

[tasks.integration]
run = "bats tests/"

[tasks."release:local"]
run = "goreleaser release --snapshot --clean --skip=publish"

[tasks."release:check"]
run = "goreleaser check"

[tasks.release]
depends = ["release:check"]
usage = '''
  arg "<tag>" help="release tag (e.g. v0.2.0)"
'''
confirm = "Are you sure you want to release helmbake {{ usage.tag }}?"
run = '''
  set -e
  tag={{ usage.tag }}
  version=${tag#v}
  sed -i.bak "s/^version:.*/version: \"$version\"/" plugin.yaml
  rm plugin.yaml.bak
  if ! git diff --quiet plugin.yaml; then
    git add plugin.yaml
    git commit -m "bump plugin version to $tag"
  fi
  git tag "$tag"
  git push origin HEAD "$tag"
'''
